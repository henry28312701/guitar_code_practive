nd: var(--sand); }\n.strum-mode-btn.active {\n  background: var(--espresso);\n  color: var(--paper);\n  border-color: var(--espresso);\n}\n\n/* ═══════════════════════════════\n   QUIZ\n═══════════════════════════════ */\n.quiz-area { max-width: 620px; margin: 0 auto; }\n.quiz-status {\n  display: flex; gap: var(--s-2); justify-content: center;\n  margin-bottom: var(--s-5); flex-wrap: wrap;\n}\n.status-badge {\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-sm);\n  padding: 7px 14px;\n  font-family: var(--font-mono);\n  font-size: 0.76rem;\n  font-weight: 500;\n  color: var(--ink);\n  letter-spacing: 0.8px;\n}\n.quiz-card {\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-lg);\n  padding: var(--s-7) var(--s-6);\n  text-align: center;\n}\n.quiz-question {\n  font-family: var(--font-mono);\n  font-size: 0.72rem;\n  color: var(--ink-soft);\n  margin-bottom: 6px;\n  letter-spacing: 1.8px;\n  text-transform: uppercase;\n  font-weight: 500;\n}\n.quiz-chord-name {\n  font-family: var(--font-serif);\n  font-size: 3.4rem;\n  font-weight: 500;\n  color: var(--espresso);\n  margin: 10px 0 var(--s-5);\n  letter-spacing: -1.2px;\n  line-height: 1;\n}\n.quiz-diagram-wrap { display: flex; justify-content: center; margin-bottom: var(--s-5); }\n.answer-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 10px;\n  margin-top: var(--s-2);\n}\n.ans-btn {\n  min-height: 52px;\n  padding: 14px;\n  border: 1px solid var(--line);\n  border-radius: var(--radius-md);\n  background: var(--bg);\n  font-family: var(--font-serif);\n  font-size: 1.15rem;\n  font-weight: 500;\n  color: var(--espresso);\n  cursor: pointer;\n  transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);\n  letter-spacing: -0.3px;\n}\n.ans-btn:hover:not(:disabled) { background: var(--sand); border-color: var(--wood); transform: translateY(-1px); }\n.ans-btn:active:not(:disabled) { transform: translateY(0); }\n.ans-btn.correct { background: var(--sage-bg); border-color: var(--sage); color: var(--sage-text); }\n.ans-btn.wrong   { background: var(--terracotta-bg); border-color: var(--terracotta); color: var(--terracotta-text); }\n.ans-btn:disabled { cursor: default; }\n.quiz-feedback {\n  margin-top: var(--s-4);\n  font-size: 0.95rem;\n  font-weight: 500;\n  min-height: 28px;\n  font-style: italic;\n  line-height: 1.55;\n}\n.quiz-feedback.ok  { color: var(--sage-text); }\n.quiz-feedback.bad { color: var(--terracotta-text); }\n.next-btn {\n  min-height: 44px;\n  margin-top: var(--s-4);\n  padding: 11px var(--s-7);\n  background: var(--espresso);\n  border: 1.5px solid var(--espresso);\n  border-radius: var(--radius-sm);\n  color: var(--paper);\n  font-family: var(--font-sans);\n  font-size: 0.92rem;\n  font-weight: 500;\n  letter-spacing: 0.2px;\n  cursor: pointer;\n  transition: opacity var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);\n  display: none;\n}\n.next-btn:hover { opacity: 0.88; }\n.next-btn:active { transform: scale(0.98); }\n.quiz-open-mode  .next-btn { background: var(--sage); border-color: var(--sage); }\n.quiz-barre-mode .next-btn { background: var(--mustard); border-color: var(--mustard); color: var(--mustard-text); }\n.result-box {\n  display: none;\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-lg);\n  padding: var(--s-8) var(--s-6);\n  text-align: center;\n}\n.result-box h2 {\n  font-family: var(--font-serif);\n  font-size: 2rem;\n  font-weight: 500;\n  color: var(--espresso);\n  margin-bottom: var(--s-3);\n  letter-spacing: -0.6px;\n}\n.result-score {\n  font-family: var(--font-serif);\n  font-size: 3.4rem;\n  font-weight: 500;\n  color: var(--wood);\n  margin: var(--s-5) 0;\n  letter-spacing: -1px;\n  line-height: 1;\n}\n.result-msg {\n  font-size: 0.95rem;\n  color: var(--ink);\n  margin-bottom: var(--s-6);\n  font-style: italic; ze: 1.3rem;\n  font-weight: 500;\n  color: var(--espresso);\n  letter-spacing: -0.4px;\n  line-height: 1.15;\n}\n.song-header-left .song-header-artist {\n  font-size: 0.85rem;\n  color: var(--ink-soft);\n  margin-top: 4px;\n  font-style: italic;\n  line-height: 1.55;\n}\n.song-header-badge {\n  font-family: var(--font-mono);\n  font-size: 0.66rem;\n  font-weight: 600;\n  padding: 4px 10px;\n  border-radius: var(--radius-sm);\n  letter-spacing: 1px;\n  text-transform: uppercase;\n}\n.gayo-song-header   .song-header-badge { background: var(--rust); color: var(--paper); }\n.sungga-song-header .song-header-badge { background: var(--mustard); color: var(--paper); }\n\n/* Song sections (verse/chorus blocks) */\n.song-section-block {\n  border: 1px solid var(--line);\n  border-radius: var(--radius-md) !important;\n  padding: var(--s-4) var(--s-5) var(--s-2) !important;\n  background: var(--paper);\n  position: relative;\n  overflow: hidden;\n}\n.gayo-section-block::before,\n.sungga-section-block::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 12px; bottom: 12px;\n  width: 3px;\n  border-radius: 0 3px 3px 0;\n}\n.gayo-section-block   { border-color: var(--line); }\n.gayo-section-block::before   { background: var(--rust); }\n.sungga-section-block { border-color: var(--line); }\n.sungga-section-block::before { background: var(--mustard); }\n.song-section-label {\n  font-family: var(--font-mono);\n  font-size: 0.68rem;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 1.6px;\n  color: var(--ink-soft);\n  margin-bottom: var(--s-3);\n}\n.chord-token-row {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n  align-items: center;\n  margin-bottom: var(--s-3);\n}\n.chord-token {\n  display: inline-block;\n  padding: 5px 12px;\n  border-radius: var(--radius-sm);\n  font-family: var(--font-serif);\n  font-size: 0.98rem;\n  font-weight: 500;\n  letter-spacing: -0.2px;\n  line-height: 1.2;\n}\n.gayo-section-block   .chord-token { background: var(--rust-bg); color: var(--rust-text); }\n.sungga-section-block .chord-token { background: var(--mustard-bg); color: var(--mustard-text); }\n.chord-token {\n  cursor: pointer;\n  transition: filter var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);\n  user-select: none;\n}\n.chord-token:hover  { filter: brightness(0.94); }\n.chord-token:active { transform: scale(0.95); }\n\n.section-divider-label {\n  font-size: 0.78rem;\n  color: var(--ink-soft);\n  margin: var(--s-2) 0 var(--s-1);\n  font-style: italic;\n  line-height: 1.55;\n}\n\n/* ═══════════════════════════════\n   SOUND BUTTON (legacy class)\n═══════════════════════════════ */\n.sound-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  margin-top: var(--s-3);\n  padding: 8px 16px;\n  background: var(--bg);\n  border: 1px solid var(--wood-light);\n  border-radius: var(--radius-sm);\n  font-family: var(--font-sans);\n  font-size: 0.85rem;\n  font-weight: 500;\n  color: var(--espresso);\n  cursor: pointer;\n  transition: background var(--t-fast) var(--ease);\n  user-select: none;\n}\n.sound-btn:hover  { background: var(--sand); }\n.sound-btn:active { background: var(--sand-deep); }\n\n/* ═══════════════════════════════\n   RESPONSIVE\n═══════════════════════════════ */\n@media (max-width: 560px) {\n  header { padding: var(--s-5) var(--s-4) var(--s-4); }\n  header h1 { font-size: 1.5rem; }\n  header p { font-size: 0.62rem; letter-spacing: 2px; margin-top: 8px; }\n\n  #homeScreen { padding: var(--s-6) var(--s-3) var(--s-8); }\n  .home-intro { margin-bottom: var(--s-6); }\n  .home-intro h2 { font-size: 1.4rem; }\n\n  .corner-card { padding: var(--s-4) var(--s-4) var(--s-4); min-height: 0; }\n  .corner-card .card-title { font-size: 1.35rem; }\n\n  .section { padding: var(--s-5) var(--s-3) var(--s-7); }\n  .section-banner { padding: var(--s-3) var(--s-4); gap: var(--s-3); }\n  .section-banner h2 { font-size: 1.08rem; }\n  .section-banner p { font-size: 0.78rem; }\n\n  .chord-grid { grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 10px; }\n  .chord-card { padding: 12px 8px 8px; }\n  .chord-card h3 { font-size: 1.25rem; }\n\n  .detail-panel { padding: var(--s-5) var(--s-4); gap: var(--s-4); }\n  .detail-panel.active { flex-direction: column; align-items: center; }\n  .detail-text { min-width: 0; width: 100%; }\n\n  .corner-tabs-bar { gap: 6px; padding: 10px; }\n  .tab-btn { padding: 8px 12px; font-size: 0.82rem; }\n\n  .quiz-card { padding: var(--s-5) var(--s-4); }\n  .quiz-chord-name { font-size: 2.6rem; }\n  .ans-btn { font-size: 1.05rem; padding: 12px; }\n\n  .back-bar-top { padding: 10px var(--s-4) 8px; }\n}\n\n@media (max-width: 400px) {\n  .corner-grid { gap: 10px; }\n  .chord-grid { grid-template-columns: repeat(auto-fill, minmax(98px, 1fr)); }\n}\n\n/* Reduced motion */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    transition-duration: 0ms !important;\n    animation-duration: 0ms !important;\n  }\n}\n\n<\u002Fstyle><\u002Fhead>\n\n\n<body>\n \n<!-- ══════════════ 공통 헤더 ══════════════ -->\n<header>\n  <h1>수성성당 주일학교<\u002Fh1>\n  <p>GUITAR · CLASS<\u002Fp>\n<\u002Fheader>\n \n<!-- 코너 내부 뒤로가기 + 코너 이동 바 -->\n<div class=\"back-bar\" id=\"backBar\">\n  <div class=\"back-bar-top\">\n    <button class=\"back-btn\" onclick=\"goHome()\">← 홈으로<\u002Fbutton>\n    <span class=\"corner-title-badge\" id=\"cornerTitleBadge\"><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"corner-nav\" id=\"cornerNav\"><\u002Fdiv>\n<\u002Fdiv>\n \n<!-- ══════════════ 홈 화면 ══════════════ -->\n<div id=\"homeScreen\">\n  <div class=\"home-intro\">\n    <h2>코너를 선택하세요<\u002Fh2>\n    <p>나의 레벨에 맞는 코너로 입장!<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"corner-grid\">\n \n    <!-- 기타 기초 -->\n    <div class=\"corner-card card-basics\" onclick=\"enterCorner('basics')\">\n      <div class=\"card-icon\">📖<\u002Fdiv>\n      <div class=\"card-title\">기타 기초<\u002Fdiv>\n      <div class=\"card-sub\">기타를 처음 잡는 분들을 위해<\u002Fdiv>\n      <ul class=\"card-items\">\n        <li><span class=\"item-dot\"><\u002Fspan>기타 구조 (헤드·넥·바디)<\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>줄 번호와 프렛 이해하기<\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>왼손·오른손 역할<\u002Fli>\n      <\u002Ful>\n      <div class=\"card-tags\">\n        <span class=\"tag\">헤드<\u002Fspan><span class=\"tag\">넥<\u002Fspan><span class=\"tag\">바디<\u002Fspan>\n        <span class=\"tag\">프렛<\u002Fspan><span class=\"tag\">줄 번호<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"go-btn\">입장하기 →<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- 기타 입문 -->\n    <div class=\"corner-card card-beginner\" onclick=\"enterCorner('beginner')\">\n      <div class=\"card-icon\">🎵<\u002Fdiv>\n      <div class=\"card-title\">기타 입문<\u002Fdiv>\n      <div class=\"card-sub\">오픈 코드 마스터하기<\u002Fdiv>\n      <ul class=\"card-items\">\n        <li><span class=\"item-dot\"><\u002Fspan>오픈 코드 배우기<\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>오픈 코드 테스트<\u002Fli>\n      <\u002Ful>\n      <div class=\"card-tags\">\n        <span class=\"tag\">C<\u002Fspan><span class=\"tag\">D<\u002Fspan><span class=\"tag\">E<\u002Fspan>\n        <span class=\"tag\">G<\u002Fspan><span class=\"tag\">A<\u002Fspan><span class=\"tag\">Dm<\u002Fspan>\n        <span class=\"tag\">Em<\u002Fspan><span class=\"tag\">Am<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"go-btn\">입장하기 →<\u002Fbutton>\n    <\u002Fdiv>\n \n    <!-- 기타 입문+ -->\n    <div class=\"corner-card card-beginner-plus\" onclick=\"enterCorner('beginnerPlus')\">\n      <div class=\"card-icon\">⭐<\u002Fdiv>\n      <div class=\"card-title\">기타 입문+<\u002Fdiv>\n      <div class=\"card-sub\">소리가 예쁜 개방현 코드 연습<\u002Fdiv>\n      <ul class=\"card-items\">\n        <li><span class=\"item-dot\"><\u002Fspan>C키 예쁜 코드 <span style=\"font-size:0.75rem;opacity:0.7\">(♯·♭없음)<\u002Fspan><\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>G키 예쁜 코드 <span style=\"font-size:0.75rem;opacity:0.7\">(♯1개)<\u002Fspan><\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>A키 쉬운 코드 <span style=\"font-size:0.75rem;opacity:0.7\">(♯♯♯)<\u002Fspan><\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>E키 쉬운 코드 <span style=\"font-size:0.75rem;opacity:0.7\">(♯♯♯♯)<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <div class=\"card-tags\">\n        <span class=\"tag\">Cadd9<\u002Fspan><span class=\"tag\">G/B<\u002Fspan>\n        <span class=\"tag\">Fadd9<\u002Fspan><span class=\"tag\">Dadd9<\u002Fspan>\n        <span class=\"tag\">Aadd9<\u002Fspan><span class=\"tag\">Bm7<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"go-btn\">입장하기 →<\u002Fbutton>\n    <\u002Fdiv>\n \n    <!-- 기타 심화 -->\n    <div class=\"corner-card card-advanced\" onclick=\"enterCorner('advanced')\">\n      <div class=\"card-icon\">🔥<\u002Fdiv>\n      <div class=\"card-title\">기타 심화<\u002Fdiv>\n      <div class=\"card-sub\">바렛 코드 정복하기<\u002Fdiv>\n      <ul class=\"card-items\">\n        <li><span class=\"item-dot\"><\u002Fspan>바렛 코드 배우기<\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>바렛 코드 테스트<\u002Fli>\n      <\u002Ful>\n      <div class=\"card-tags\">\n        <span class=\"tag\">F<\u002Fspan><span class=\"tag\">B<\u002Fspan><span class=\"tag\">Cm<\u002Fspan>\n        <span class=\"tag\">Fm<\u002Fspan><span class=\"tag\">Gm<\u002Fspan><span class=\"tag\">Bm<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"go-btn\">입장하기 →<\u002Fbutton>\n    <\u002Fdiv>\n     \n    <!-- 노래 -->\n    <div class=\"corner-card card-songs\" onclick=\"enterCorner('songs')\">\n      <div class=\"card-icon\">🎤<\u002Fdiv>\n      <div class=\"card-title\">노래<\u002Fdiv>\n      <div class=\"card-sub\">노래별 코드 연습하기<\u002Fdiv>\n      <ul class=\"card-items\">\n        <li><span class=\"item-dot\"><\u002Fspan>가요 코드<\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>성가 코드<\u002Fli>\n      <\u002Ful>\n      <div class=\"card-tags\">\n        <span class=\"tag\">첫사랑<\u002Fspan><span class=\"tag\">I AM<\u002Fspan><span class=\"tag\">Baby<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"go-btn\">입장하기 →<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- 기타 튜너 -->\n    <div class=\"corner-card card-tuner\" onclick=\"enterCorner('tuner')\">\n      <div class=\"card-icon\">🎛️<\u002Fdiv>\n      <div class=\"card-title\">기타 튜너<\u002Fdiv>\n      <div class=\"card-sub\">표준 튜닝으로 맞춰보기<\u002Fdiv>\n      <ul class=\"card-items\">\n        <li><span class=\"item-dot\"><\u002Fspan>실시간 음정 감지<\u002Fli>\n        <li><span class=\"item-dot\"><\u002Fspan>6줄 개별 튜닝<\u002Fli>\n      <\u002Ful>\n      <div class=\"card-tags\">\n        <span class=\"tag\">E2<\u002Fspan><span class=\"tag\">A2<\u002Fspan><span class=\"tag\">D3<\u002Fspan>\n        <span class=\"tag\">G3<\u002Fspan><span class=\"tag\">B3<\u002Fspan><span class=\"tag\">e4<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"go-btn\">입장하기 →<\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n \n<!-- ══════════════ 코너 화면 ══════════════ -->\n<div id=\"cornerScreen\">\n \n  <!-- 탭 바 (JS로 내용 채움) -->\n  <div class=\"corner-tabs-bar\" id=\"cornerTabsBar\"><\u002Fdiv>\n \n  <!-- ── 기타 기초 ── -->\n  <div id=\"learn-basics\" class=\"section\">\n    <div class=\"section-banner basics-style\">\n      <div class=\"banner-icon\">📖<\u002Fdiv>\n      <div>\n        <h2>기타 기초<\u002Fh2>\n        <p>기타를 처음 잡는 분들을 위한 기본 지식<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"basics-content\">\n      <div class=\"basics-item\">\n        <div class=\"basics-num\">1<\u002Fdiv>\n        <div class=\"basics-text\">기타는 줄을 감는 튜너가 위치한 <strong>헤드<\u002Fstrong>, 지판의 대부분이 위치한 <strong>넥<\u002Fstrong>, 스트로크를 하는 부위인 <strong>바디<\u002Fstrong>로 구성된다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"basics-item\">\n        <div class=\"basics-num\">2<\u002Fdiv>\n        <div class=\"basics-text\">기타는 <strong>굵은 줄이 위로<\u002Fstrong>, <strong>얇은 줄이 아래로<\u002Fstrong> 가도록 잡는다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"basics-item\">\n        <div class=\"basics-num\">3<\u002Fdiv>\n        <div class=\"basics-text\">가장 굵은 줄이 <strong>6번 줄<\u002Fstrong>, 가장 얇은 줄이 <strong>1번 줄<\u002Fstrong>이다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"basics-item\">\n        <div class=\"basics-num\">4<\u002Fdiv>\n        <div class=\"basics-text\">기타의 지판을 뜻하는 말은 <strong>프렛(fret)<\u002Fstrong>이다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"basics-item\">\n        <div class=\"basics-num\">5<\u002Fdiv>\n        <div class=\"basics-text\"><strong>1프렛<\u002Fstrong>은 넥에서 가장 가까운 프렛이며, 한 칸씩 넥에서 멀어질수록(바디에 가까워질수록) <strong>2프렛<\u002Fstrong>, <strong>3프렛<\u002Fstrong>이라고 부른다.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"basics-item\">\n        <div class=\"basics-num\">6<\u002Fdiv>\n        <div class=\"basics-text\"><strong>왼손<\u002Fstrong>으로 넥 부분의 프렛을 잡고, <strong>오른손<\u002Fstrong>으로 줄을 튕겨 연주한다.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 오픈 코드 배우기 ── -->\n  <div id=\"learn-open\" class=\"section\">\n    <div class=\"section-banner open-style\">\n      <div class=\"banner-icon\">🎵<\u002Fdiv>\n      <div>\n        <h2>오픈 코드 배우기<\u002Fh2>\n        <p>개방현을 활용한 기초 코드 · C D E G A Dm Em Am Bm7<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chord-grid\" id=\"openGrid\"><\u002Fdiv>\n    <div class=\"detail-panel\" id=\"openDetailPanel\"><\u002Fdiv>\n  <\u002Fdiv>\n \n  <!-- ── 오픈 코드 테스트 ── -->\n  <div id=\"quiz-open\" class=\"section\">\n    <div class=\"section-banner quiz-open-style\">\n      <div class=\"banner-icon\">✅<\u002Fdiv>\n      <div>\n        <h2>오픈 코드 테스트<\u002Fh2>\n        <p>배운 오픈 코드를 퀴즈로 확인해봐요!<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz-area quiz-open-mode\" id=\"quizOpenArea\">\n      <div class=\"mode-select\" id=\"openModeSelect\">\n        <h3>퀴즈 방식을 골라봐요!<\u002Fh3>\n        <div class=\"mode-btns\">\n          <button class=\"mode-btn active\" id=\"openModeNameBtn\" onclick=\"setQuizMode('open','name')\">코드명 보고 운지법 찾기<\u002Fbutton>\n          <button class=\"mode-btn\" id=\"openModeDiagBtn\" onclick=\"setQuizMode('open','diagram')\">운지법 보고 코드명 찾기<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"openQuizCard\"><\u002Fdiv>\n      <div id=\"openResultBox\" class=\"result-box\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n \n  <!-- ── A키 쉬운 코드 ── -->\n  <div id=\"learn-akey\" class=\"section\">\n    <div class=\"section-banner akey-style\">\n      <div class=\"banner-icon\">🅐<\u002Fdiv>\n      <div>\n        <h2>A키 쉬운 코드 (♯3개)<\u002Fh2>\n        <p>개방현 활용 A키 코드 · Aadd9 · G#m7 · F#m7 · D · C#m7 · Bm7<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chord-grid\" id=\"akeyGrid\"><\u002Fdiv>\n    <div class=\"detail-panel\" id=\"akeyDetailPanel\"><\u002Fdiv>\n  <\u002Fdiv>\n \n  <!-- ── E키 쉬운 코드 ── -->\n  <div id=\"learn-ekey\" class=\"section\">\n    <div class=\"section-banner ekey-style\">\n      <div class=\"banner-icon\">🎵<\u002Fdiv>\n      <div>\n        <h2>E키 쉬운 코드 (♯4개)<\u002Fh2>\n        <p>개방현 활용 E키 코드 · E · C#m7 · Bsus4 · Aadd9 · G#m7 · F#m7<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chord-grid\" id=\"ekeyGrid\"><\u002Fdiv>\n    <div class=\"detail-panel\" id=\"ekeyDetailPanel\"><\u002Fdiv>\n  <\u002Fdiv>\n \n  <!-- ── C키 소리가 예쁜 코드 ── -->\n  <div id=\"learn-ckey\" class=\"section\">\n    <div class=\"section-banner ckey-style\">\n      <div class=\"banner-icon\">🎼<\u002Fdiv>\n      <div>\n        <h2>C키 소리가 예쁜 코드 (♯·♭없음)<\u002Fh2>\n        <p>개방현 활용 C키 코드 · Cadd9 · G/B · Am7 · G · Fadd9 · Em · Dm<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chord-grid\" id=\"ckeyGrid\"><\u002Fdiv>\n    <div class=\"detail-panel\" id=\"ckeyDetailPanel\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── G키 소리가 예쁜 코드 ── -->\n  <div id=\"learn-gkey\" class=\"section\">\n    <div class=\"section-banner gkey-style\">\n      <div class=\"banner-icon\">🎶<\u002Fdiv>\n      <div>\n        <h2>G키 쉽고 소리가 예쁜 코드 (♯1개)<\u002Fh2>\n        <p>개방현 활용 G키 코드 · G · D/F# · Em · Dsus4 · Dadd9 · C \n// ═══════════════════════════════════════════════════\nconst CORNERS = {\n  basics: {\n    label: '📖 기타 기초',\n    tabs: [\n      { id:'learn-basics', label:'📖 기타 기초', sub:'구조·줄·프렛·손 역할', cls:'basics-tab' },\n    ],\n    onEnter: () => {}\n  },\n  beginner: {\n    label: '🎵 기타 입문',\n    tabs: [\n      { id:'learn-open',  label:'🎵 오픈 코드 배우기', sub:'C D E G A Dm Em Am Bm7', cls:'open-tab' },\n      { id:'quiz-open',   label:'✅ 오픈 코드 테스트',  sub:'9개 코드 퀴즈',     cls:'quiz-open' },\n    ],\n    onEnter: () => {\n      renderGrid(OPEN_CHORDS, 'openGrid', null, 'open');\n    }\n  },\n  beginnerPlus: {\n    label: '⭐ 기타 입문+',\n    tabs: [\n      { id:'learn-ckey', label:'🎼 C키 예쁜 코드', sub:'♯·♭없음', cls:'ckey-tab' },\n      { id:'learn-gkey', label:'🎶 G키 예쁜 코드', sub:'♯1개', cls:'gkey-tab' },\n      { id:'learn-akey', label:'🅐 A키 쉬운 코드', sub:'♯3개', cls:'akey-tab' },\n      { id:'learn-ekey', label:'🎵 E키 쉬운 코드', sub:'♯4개', cls:'ekey-tab' },\n    ],\n    onEnter: () => {\n      renderGrid(CKEY_CHORDS, 'ckeyGrid', null, 'ckey');\n      renderGrid(GKEY_CHORDS, 'gkeyGrid', null, 'gkey');\n      renderGrid(AKEY_CHORDS, 'akeyGrid', null, 'akey');\n      renderGrid(EKEY_CHORDS, 'ekeyGrid', null, 'ekey');\n    }\n  },\n  advanced: {\n    label: '🔥 기타 심화',\n    tabs: [\n      { id:'learn-barre', label:'🎸 바렛 코드 배우기', sub:'F B Cm Fm Gm Bm', cls:'barre-tab' },\n      { id:'quiz-barre',  label:'🔥 바렛 코드 테스트',  sub:'6개 코드 퀴즈',  cls:'quiz-barre' },\n    ],\n    onEnter: () => {\n      renderGrid(BARRE_CHORDS, 'barreGrid', null, 'barre');\n    }\n },\n  tuner: {\n    label: '🎛️ 기타 튜너',\n    tabs: [\n      { id:'tuner-section', label:'🎛️ 기타 튜너', sub:'Standard Tuning', cls:'tuner-tab' },\n    ],\n    onEnter: () => {\n      initTunerUI();\n    }\n  },\n  songs: {\n    label: '🎤 노래',\n    tabs: [\n      { id:'songs-gayo',   label:'🎤 가요',  sub:'첫사랑 · I AM · Baby',       cls:'gayo-tab'   },\n      { id:'songs-sungga', label:'🙏 성가', sub:'날마다 숨 쉬는 순간마다',    cls:'sungga-tab' },\n    ],\n    onEnter: () => {\n      // 곡 목록 화면으로 초기화\n      backToSongList('gayo');\n      backToSongList('sungga');\n    }\n  }\n};\n \nlet currentCorner = null;\n \n// 코너별 버튼 스타일 정보 (따뜻한 아날로그 톤)\nconst CORNER_NAV_STYLE = {\n  basics:      { bg:'#7A8B5C', color:'#FBF6EC', border:'#5A6B40' },\n  beginner:    { bg:'#8B6F47', color:'#FBF6EC', border:'#6A532F' },\n  beginnerPlus:{ bg:'#C49A4E', color:'#FBF6EC', border:'#9E7A35' },\n  advanced:    { bg:'#A85742', color:'#FBF6EC', border:'#854231' },\n  tuner:       { bg:'#5C7A6F', color:'#FBF6EC', border:'#3F5950' },\n  songs:       { bg:'#B8704F', color:'#FBF6EC', border:'#8E5538' },\n};\n\nfunction renderCornerNav(currentKey) {\n  const nav = document.getElementById('cornerNav');\n  nav.innerHTML = Object.entries(CORNERS).map(([key, corner]) => {\n    const style = CORNER_NAV_STYLE[key];\n    const isCurrent = key === currentKey;\n    const btnStyle = isCurrent\n      ? `background:${style.bg};color:${style.color};border-color:${style.border};`\n      : `background:transparent;color:${style.bg};border-color:${style.bg}55;`;\n    return `<button class=\"corner-nav-btn${isCurrent ? ' nav-current' : ''}\"\n              style=\"${btnStyle}\"\n              onclick=\"${isCurrent ? '' : `enterCorner('${key}')`}\">\n              ${corner.label}\n            <\u002Fbutton>`;\n  }).join('');\n}\n\nfunction enterCorner(cornerKey) {\n  const corner = CORNERS[cornerKey];\n  currentCorner = cornerKey;\n\n  // 화면 전환\n  document.getElementById('homeScreen').style.display   = 'none';\n  document.getElementById('cornerScreen').style.display = 'block';\n  const backBar = document.getElementById('backBar');\n  backBar.classList.add('visible');\n  document.getElementById('cornerTitleBadge').textContent = corner.label;\n\n  // 코너 이동 버튼 렌더링\n  renderCornerNav(cornerKey);\n \n  // 탭 바 생성\n  const tabsBar = document.getElementById('cornerTabsBar');\n  tabsBar.innerHTML = corner.tabs.map((t, i) => `\n    <button class=\"tab-btn ${t.cls} ${i === 0 ? 'active' : ''}\"\n            onclick=\"showSection('${t.id}', this)\">\n      ${t.label}\n      <span class=\"tab-label\">${t.sub}<\u002Fspan>\n    <\u002Fbutton>\n  `).join('');\n \n  // 모든 섹션 숨기기\n  document.querySelectorAll('#cornerScreen .section').forEach(s => s.classList.remove('active'));\n \n  // onEnter 훅 실행\n  corner.onEnter();\n \n  // 첫 번째 탭 활성화\n  const firstTabId = corner.tabs[0].id;\n  document.getElementById(firstTabId).classList.add('active');\n \n  // 퀴즈 탭이면 초기화\n  if (firstTabId === 'quiz-open')  startQuiz('open');\n  if (firstTabId === 'quiz-barre') startQuiz('barre');\n \n  window.scrollTo({ top: 0, behavior: 'smooth' });\n}\n \nfunction goHome() {\n  document.getElementById('homeScreen').style.display   = 'block';\n  document.getElementById('cornerScreen').style.display = 'none';\n  document.getElementById('backBar').classList.remove('visible');\n  // 상세 패널 닫기\n  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));\n  currentCorner = null;\n  window.scrollTo({ top: 0, behavior: 'smooth' });\n}\n \nfunction showSection(id, btn) {\n  // 같은 코너 내 탭 전환\n  const corner = CORNERS[currentCorner];\n  corner.tabs.forEach(t => {\n    document.getElementById(t.id).classList.remove('active');\n  });\n  document.querySelectorAll('#cornerTabsBar .tab-btn').forEach(b => b.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  btn.classList.add('active');\n  if (id === 'quiz-open')  startQuiz('open');\n  if (id === 'quiz-barre') startQuiz('barre');\n}\n \n// ═══════════════════════════════════════════════════\n//  SVG 다이어그램 생성\n// ═══════════════════════════════════════════════════\nfunction buildDiagram(chord, size = 160) {\n  const S = size, sx = S*0.15, sy = S*0.18, sw = S*0.70, sh = S*0.68;\n  const cs = sw/5, rs = sh/4;\n  let minFret = Math.min(...chord.frets.filter(f => f > 0));\n  if (!isFinite(minFret) || minFret <= 0) minFret = 1;\n  let maxFret = Math.max(...chord.frets.filter(f => f > 0));\n  if (!isFinite(maxFret) || maxFret <= 0) maxFret = 1;\n  let startFret, labelFret;\n  if (minFret === 4 && maxFret === 4) {\n    // 4프렛만 사용: 두 번째 줄에 표시, \"4fr\" 레이블\n    startFret = 3;\n    labelFret = 4;\n  } else if (maxFret <= 4) {\n    startFret = 1;\n    labelFret = 1;\n  } else {\n    startFret = minFret;\n    labelFret = minFret;\n  }\n  let svg = `<svg width=\"${S}\" height=\"${S}\" viewBox=\"0 0 ${S} ${S}\" xmlns=\"http://www.w3.org/2000/svg\">`;\n  if (labelFret > 1) {\n    svg += `<text x=\"${sx-4}\" y=\"${sy+(minFret-startFret+0.5)*rs}\" font-size=\"${S*0.075}\" fill=\"#8B7355\" text-anchor=\"end\" dominant-baseline=\"middle\" font-family=\"'SF Mono', Menlo, monospace\">${labelFret}fr<\u002Ftext>`;\n  } else {\n    svg += `<rect x=\"${sx}\" y=\"${sy-4}\" width=\"${sw}\" height=\"5\" rx=\"2\" fill=\"#3D3022\"/>`;\n  }\n  for (let i = 0; i <= 4; i++) {\n    const y = sy + i * rs;\n    svg += `<line x1=\"${sx}\" y1=\"${y}\" x2=\"${sx+sw}\" y2=\"${y}\" stroke=\"#D4C4A0\" stroke-width=\"1.5\"/>`;\n  }\n  for (let s = 0; s < 6; s++) {\n    const x = sx + s * cs;\n    svg += `<line x1=\"${x}\" y1=\"${sy}\" x2=\"${x}\" y2=\"${sy+sh}\" stroke=\"#A89578\" stroke-width=\"1.2\"/>`;\n  }\n  if (chord.barre) {\n    const b = chord.barre, bfret = b.fret - startFret;\n    if (bfret >= 0 && bfret < 4) {\n      const y = sy + (bfret+0.5)*rs;\n      const x1 = sx + (6-b.from)*cs, x2 = sx + (6-b.to)*cs;\n      svg += `<line x1=\"${x1}\" y1=\"${y}\" x2=\"${x2}\" y2=\"${y}\" stroke=\"#A85742\" stroke-width=\"${S*0.065}\" stroke-linecap=\"round\" opacity=\"0.7\"/>`;\n    }\n  }\n  const drawn = new Set();\n  chord.fingers.forEach(([f, str, fret]) => {\n    const key = `${str},${fret}`;\n    if (drawn.has(key)) return;\n    drawn.add(key);\n    const relFret = fret - startFret;\n    if (relFret < 0 || relFret >= 4) return;\n    const x = sx + (6-str)*cs, y = sy + (relFret+0.5)*rs;\n    svg += `<circle cx=\"${x}\" cy=\"${y}\" r=\"${S*0.055}\" fill=\"#3D3022\"/>`;\n    svg += `<text x=\"${x}\" y=\"${y+S*0.02}\" font-size=\"${S*0.075}\" fill=\"#FBF6EC\" text-anchor=\"middle\" dominant-baseline=\"middle\" font-weight=\"500\" font-family=\"'SF Mono', Menlo, monospace\">${f}<\u002Ftext>`;\n  });\n  for (let s = 0; s < 6; s++) {\n    const f = chord.frets[5-s], x = sx+s*cs, y = sy-S*0.08;\n    if (f === -1) {\n      svg += `<text x=\"${x}\" y=\"${y+S*0.01}\" font-size=\"${S*0.09}\" fill=\"#A85742\" text-anchor=\"middle\" dominant-baseline=\"middle\" font-family=\"serif\">×<\u002Ftext>`;\n    } else if (f === 0) {\n      svg += `<circle cx=\"${x}\" cy=\"${y}\" r=\"${S*0.044}\" fill=\"none\" stroke=\"#7A8B5C\" stroke-width=\"1.8\"/>`;\n    }\n  }\n  const strNames = ['E','A','D','G','B','e'];\n  for (let s = 0; s < 6; s++) {\n    const x = sx+s*cs, y = sy+sh+S*0.08;\n    svg += `<text x=\"${x}\" y=\"${y}\" font-size=\"${S*0.065}\" fill=\"#8B7355\" text-anchor=\"middle\" font-family=\"'SF Mono', Menlo, monospace\">${strNames[s]}<\u002Ftext>`;\n  }\n  svg += `<\u002Fsvg>`;\n  return svg;\n}\n \n// ═══════════════════════════════════════════════════\n//  배우기 — 그리드 & 상세 패널\n// ═══════════════════════════════════════════════════\nconst SECTION_META = {\n  open:       { chordsRef:()=>OPEN_CHORDS,       selClass:'selected-open',    desc:'오픈 코드 — 개방줄을 활용한 코드',              gridId:'openGrid',        panelId:'openDetailPanel'   },\n  barre:      { chordsRef:()=>BARRE_CHORDS,      selClass:'selected-barre',   desc:'바렛 코드 — 검지로 전체 프렛을 바렛',            gridId:'barreGrid',       panelId:'barreDetailPanel'  },\n  akey:       { chordsRef:()=>AKEY_CHORDS,       selClass:'selected-akey',    desc:'A키 (#3개) — 개방줄 활용 쉬운 코드',            gridId:'akeyGrid',        panelId:'akeyDetailPanel'   },\n  ekey:       { chordsRef:()=>EKEY_CHORDS,       selClass:'selected-ekey',    desc:'E키 (#4개) — 개방줄 활용 쉬운 코드',            gridId:'ekeyGrid',        panelId:'ekeyDetailPanel'   },\n  ckey:       { chordsRef:()=>CKEY_CHORDS,       selClass:'selected-ckey',    desc:'C키 (♯·♭없음) — 소리가 예쁜 개방현 코드',      gridId:'ckeyGrid',        panelId:'ckeyDetailPanel'   },\n  gkey:       { chordsRef:()=>GKEY_CHORDS,       selClass:'selected-gkey',    desc:'G키 (#1개) — 쉽고 소리가 예쁜 개방현 코드',     gridId:'gkeyGrid',        panelId:'gkeyDetailPanel'   },\n  firstlove:  { chordsRef:()=>CHORDS_FIRSTLOVE,  selClass:'selected-gayo',    desc:'첫사랑 (백아) — 코드 연습',                       gridId:'gayoChordGrid',   panelId:'gayoChordDetail'   },\n  iveVerse:   { chordsRef:()=>CHORDS_IVE_VERSE,  selClass:'selected-gayo',    desc:'I AM (IVE) — Verse: Am-C-G-D',                    gridId:'iveVerseGrid',    panelId:'iveVerseDetail'    },\n  iveChorus:  { chordsRef:()=>CHORDS_IVE_CHORUS, selClass:'selected-gayo',    desc:'I AM (IVE) — Chorus: Am-D-G-Em',                  gridId:'iveChorusGrid',   panelId:'iveChorusDetail'   },\n  babyv1:     { chordsRef:()=>CHORDS_BABY_V1,    selClass:'selected-gayo',    desc:'Baby (Justin Bieber) — Ver.1 3 Capo',             gridId:'babyV1ChordGrid', panelId:'babyV1ChordDetail' },\n  babyv2:     { chordsRef:()=>CHORDS_BABY_V2,    selClass:'selected-gayo',    desc:'Baby (Justin Bieber) — Ver.2 1 Capo',             gridId:'babyV2ChordGrid', panelId:'babyV2ChordDetail' },\n  nalmada:    { chordsRef:()=>CHORDS_NALMADA,    selClass:'selected-sungga',  desc:'날마다 숨 쉬는 순간마다 (나주노 190) — 코드 연습', gridId:'sunggaChordGrid', panelId:'sunggaChordDetail' },\n};\n \nfunction renderGrid(chords, gridId, selectedName, sectionType) {\n  const meta = SECTION_META[sectionType];\n  document.getElementById(gridId).innerHTML = chords.map(c => `\n    <div class=\"chord-card ${selectedName === c.name ? meta.selClass : ''}\"\n         onclick=\"showDetail('${c.name}','${sectionType}')\">\n      <div class=\"chord-type\">${c.type === 'open' ? 'Open Chord' : 'Barre Chord'}<\u002Fdiv>\n      <h3>${c.name}<\u002Fh3>\n      <div>${buildDiagram(c, 100)}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n \nconst _selectedChord = {};\n\nfunction showDetail(name, sectionType) {\n  const meta   = SECTION_META[sectionType];\n  const chords = meta.chordsRef();\n  const c      = chords.find(x => x.name === name);\n  if (!c) return;\n  const gridId  = meta.gridId;\n  const panelId = meta.panelId;\n  const panel   = document.getElementById(panelId);\n\n  // 이미 선택된 코드를 다시 누르면 패널 닫기\n  if (_selectedChord[sectionType] === name && panel.classList.contains('active')) {\n    _selectedChord[sectionType] = null;\n    renderGrid(chords, gridId, null, sectionType);\n    panel.classList.remove('active');\n    return;\n  }\n\n  _selectedChord[sectionType] = name;\n  renderGrid(chords, gridId, name, sectionType);\n  panel.innerHTML = `\n    <div class=\"diagram-wrap\">${buildDiagram(c, 200)}<\u002Fdiv>\n    <div class=\"detail-text\">\n      <h2>${c.name}${c.barre ? '<span class=\"barre-badge\">바렛 코드<\u002Fspan>' : ''}<\u002Fh2>\n      <p class=\"chord-desc\">${meta.desc}<\u002Fp>\n      <ul class=\"finger-guide\">\n        ${c.guide.map((g,i) => `<li><span class=\"finger-num\">${i+1}<\u002Fspan>${g}<\u002Fli>`).join('')}\n      <\u002Ful>\n      <div class=\"tip-box\">💡 ${c.tip}<\u002Fdiv>\n      <div class=\"strum-mode-bar\">\n        <span class=\"strum-mode-label\">소리 듣기:<\u002Fspan>\n        <button class=\"strum-mode-btn${_strumGap === 0.015 ? ' active' : ''}\" id=\"strumBtnFast\" onclick=\"setStrumModeAndPlay('fast','${c.name}','${sectionType}')\">스트로크<\u002Fbutton>\n        <button class=\"strum-mode-btn${_strumGap !== 0.015 ? ' active' : ''}\" id=\"strumBtnArpeggio\" onclick=\"setStrumModeAndPlay('arpeggio','${c.name}','${sectionType}')\">아르페지오<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  panel.classList.add('active');\n  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });\n}\n \n// ─── 곡 선택 / 목록으로 ───\nconst SONG_RENDER = {\n  firstlove: () => renderGrid(CHORDS_FIRSTLOVE, 'gayoChordGrid',   null, 'firstlove'),\n  ive:       () => {\n    renderGrid(CHORDS_IVE_VERSE,  'iveVerseGrid',  null, 'iveVerse');\n    renderGrid(CHORDS_IVE_CHORUS, 'iveChorusGrid', null, 'iveChorus');\n  },\n  baby:      () => {\n    renderGrid(CHORDS_BABY_V1, 'babyV1ChordGrid', null, 'babyv1');\n    renderGrid(CHORDS_BABY_V2, 'babyV2ChordGrid', null, 'babyv2');\n  },\n  nalmada:   () => renderGrid(CHORDS_NALMADA, 'sunggaChordGrid', null, 'nalmada'),\n};\nconst SONG_CORNER = { firstlove:'gayo', ive:'gayo', baby:'gayo', nalmada:'sungga' };\n\nfunction selectSong(songKey) {\n  const corner = SONG_CORNER[songKey];\n  document.getElementById(`${corner}SongList`).style.display   = 'none';\n  document.getElementById(`${corner}SongDetail`).style.display = 'block';\n  document.querySelectorAll(`#${corner}SongDetail .song-area`).forEach(el => el.style.display = 'none');\n  document.getElementById(`${songKey}Area`).style.display = 'block';\n  SONG_RENDER[songKey]();\n}\n\nfunction backToSongList(corner) {\n  const listEl   = document.getElementById(`${corner}SongList`);\n  const detailEl = document.getElementById(`${corner}SongDetail`);\n  if (listEl)   listEl.style.display   = 'block';\n  if (detailEl) detailEl.style.display = 'none';\n  // 상세 패널 초기화\n  if (detailEl) detailEl.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));\n}\n\n// ═══════════════════════════════════════════════════\n//  퀴즈\n// ═══════════════════════════════════════════════════\nconst quizState = {\n  open:  { mode:'name', q:[], idx:0, score:0, total:9 },\n  barre: { mode:'name', q:[], idx:0, score:0, total:6 },\n};\nfunction setQuizMode(pool, mode) {\n  quizState[pool].mode = mode;\n  document.getElementById(`${pool}ModeNameBtn`).classList.toggle('active', mode==='name');\n  document.getElementById(`${pool}ModeDiagBtn`).classList.toggle('active', mode==='diagram');\n  startQuiz(pool);\n}\nfunction shuffle(arr) {\n  const a = [...arr];\n  for (let i = a.length-1; i > 0; i--) {\n    const j = Math.floor(Math.random()*(i+1));\n    [a[i],a[j]] = [a[j],a[i]];\n  }\n  return a;\n}\nfunction startQuiz(pool) {\n  const st = quizState[pool];\n  const poolChords = pool==='open' ? OPEN_CHORDS : BARRE_CHORDS;\n  st.q = shuffle(poolChords).slice(0, st.total);\n  while (st.q.length < st.total) st.q = [...st.q,...shuffle(poolChords)].slice(0,st.total);\n  st.idx = 0; st.score = 0;\n  document.getElementById(`${pool}ResultBox`).style.display = 'none';\n  renderQuestion(pool);\n}\nfunction renderQuestion(pool) {\n  const st = quizState[pool];\n  const card = document.getElementById(`${pool}QuizCard`);\n  if (st.idx >= st.q.length) { showResult(pool); return; }\n  const correct    = st.q[st.idx];\n  const poolChords = pool==='open' ? OPEN_CHORDS : BARRE_CHORDS;\n  const wrong3     = shuffle(poolChords.filter(c=>c.name!==correct.name)).slice(0,3);\n  const options    = shuffle([correct,...wrong3]);\n  if (st.mode === 'name') {\n    card.innerHTML = `\n      <div class=\"quiz-status\">\n        <span class=\"status-badge\">🎯 ${st.idx+1} / ${st.total}<\u002Fspan>\n        <span class=\"status-badge\">✅ ${st.score} 정답<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"quiz-card\">\n        <p class=\"quiz-question\">이 코드의 운지법은?<\u002Fp>\n        <div class=\"quiz-chord-name\">${correct.name}<\u002Fdiv>\n        <div class=\"answer-grid\">\n          ${options.map(o=>`\n            <button class=\"ans-btn\" data-chord=\"${o.name}\" onclick=\"checkAnswer(this,'${o.name}','${correct.name}','${pool}')\">\n              ${buildDiagram(o,110)}\n            <\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n        <div class=\"quiz-feedback\" id=\"${pool}Feedback\"><\u002Fdiv>\n        <button class=\"next-btn\" id=\"${pool}NextBtn\" onclick=\"nextQuestion('${pool}')\">다음 →<\u002Fbutton>\n      <\u002Fdiv>`;\n  } else {\n    card.innerHTML = `\n      <div class=\"quiz-status\">\n        <span class=\"status-badge\">🎯 ${st.idx+1} / ${st.total}<\u002Fspan>\n        <span class=\"status-badge\">✅ ${st.score} 정답<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"quiz-card\">\n        <p class=\"quiz-question\">이 운지법의 코드명은?<\u002Fp>\n        <div class=\"quiz-diagram-wrap\">${buildDiagram(correct,180)}<\u002Fdiv>\n        <div class=\"answer-grid\">\n          ${options.map(o=>`\n            <button class=\"ans-btn\" onclick=\"checkAnswer(this,'${o.name}','${correct.name}','${pool}')\">${o.name}<\u002Fbutton>`).join('')}\n        <\u002Fdiv>\n        <div class=\"quiz-feedback\" id=\"${pool}Feedback\"><\u002Fdiv>\n        <button class=\"next-btn\" id=\"${pool}NextBtn\" onclick=\"nextQuestion('${pool}')\">다음 →<\u002Fbutton>\n      <\u002Fdiv>`;\n  }\n}\nfunction checkAnswer(btn, chosen, correct, pool) {\n  if (btn.disabled) return;\n  document.querySelectorAll(`#${pool}QuizCard .ans-btn`).forEach(b=>b.disabled=true);\n  const feedback = document.getElementById(`${pool}Feedback`);\n  const nextBtn  = document.getElementById(`${pool}NextBtn`);\n  if (chosen === correct) {\n    btn.classList.add('correct');\n    feedback.textContent = '🎉 이욜~~좀 친다 이거지?';\n    feedback.className = 'quiz-feedback ok';\n    quizState[pool].score++;\n    const _correctChord = _findChordByName(correct);\n    if (_correctChord) setTimeout(() => playChordSound(_correctChord), 150);\n  } else {\n    btn.classList.add('wrong');\n    document.querySelectorAll(`#${pool}QuizCard .ans-btn`).forEach(b=>{\n      if (b.dataset.chord===correct) b.classList.add('correct');\n    });\n    feedback.textContent = '❌ 에휴~ 넌 코드 공부 좀 더 해야겠다...';\n    feedback.className = 'quiz-feedback bad';\n  }\n  nextBtn.style.display = 'inline-block';\n}\nfunction nextQuestion(pool) { quizState[pool].idx++; renderQuestion(pool); }\n\n   // ═══════════════════════════════════════════════════\n//  기타 튜너\n// ═══════════════════════════════════════════════════\nconst STRINGS = [\n  { note:'e', octave:4, freq:329.63, strNum:1 },\n  { note:'B', octave:3, freq:246.94, strNum:2 },\n  { note:'G', octave:3, freq:196.00, strNum:3 },\n  { note:'D', octave:3, freq:146.83, strNum:4 },\n  { note:'A', octave:2, freq:110.00, strNum:5 },\n  { note:'E', octave:2, freq:82.41,  strNum:6 },\n];\n\nlet tunerActive    = false;\nlet tunerStream    = null;\nlet tunerCtx       = null;\nlet tunerAnalyser  = null;\nlet tunerAnimId    = null;\nlet selectedStr    = 5; // 기본: 6번줄(E2)\nlet tunerAutoMode  = false;\n\nfunction initTunerUI() {\n  selectString(5);\n}\n\nfunction setTunerMode(mode) {\n  tunerAutoMode = (mode === 'auto');\n  document.getElementById('modeManualBtn').classList.toggle('active', !tunerAutoMode);\n  document.getElementById('modeAutoBtn').classList.toggle('active', tunerAutoMode);\n  document.getElementById('stringBtns').classList.toggle('auto-mode', tunerAutoMode);\n}\n\nfunction updateStringHighlight(idx) {\n  document.querySelectorAll('.str-btn').forEach((b, i) => {\n    b.classList.toggle('active', i === 5 - idx);\n  });\n}\n\nfunction selectString(idx) {\n  selectedStr = idx;\n  updateStringHighlight(idx);\n  const s = STRINGS[idx];\n  document.getElementById('tunerTargetNote').textContent = s.note;\n  document.getElementById('tunerTargetHz').textContent   = s.freq.toFixed(2) + ' Hz';\n  setNeedle(0);\n  document.getElementById('tunerLabel').className   = 'tuner-label';\n  document.getElementById('tunerLabel').textContent  = tunerActive ? '연주해보세요' : '마이크 대기';\n}\n\nasync function toggleTuner() {\n  if (tunerActive) {\n    stopTuner();\n  } else {\n    await startTuner();\n  }\n}\n\nasync function startTuner() {\n  try {\n    tunerStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });\n  } catch(e) {\n    alert('마이크 접근 권한을 허용해주세요!!');\n    return;\n  }\n  tunerCtx     = new (window.AudioContext || window.webkitAudioContext)();\n  tunerAnalyser = tunerCtx.createAnalyser();\n  tunerAnalyser.fftSize = 4096;\n  const src = tunerCtx.createMediaStreamSource(tunerStream);\n  src.connect(tunerAnalyser);\n  tunerActive = true;\n  const btn = document.getElementById('tunerStartBtn');\n  btn.textContent = '⏹️ 튜닝 중지';\n  btn.classList.add('active');\n  document.getElementById('tunerLabel').textContent = '연주해보세요';\n  detectLoop();\n}\n\nfunction stopTuner() {\n  tunerActive = false;\n  if (tunerAnimId) cancelAnimationFrame(tunerAnimId);\n  if (tunerStream) tunerStream.getTracks().forEach(t => t.stop());\n  if (tunerCtx)    tunerCtx.close();\n  tunerCtx = tunerAnalyser = tunerStream = null;\n  const btn = document.getElementById('tunerStartBtn');\n  btn.textContent = '🎙️ 튜닝 시작';\n  btn.classList.remove('active');\n  setNeedle(0);\n  document.getElementById('tunerLabel').className   = 'tuner-label';\n  document.getElementById('tunerLabel').textContent  = '마이크 대기';\n}\n\nfunction detectLoop() {\n  if (!tunerActive) return;\n  const buf  = new Float32Array(tunerAnalyser.fftSize);\n  tunerAnalyser.getFloatTimeDomainData(buf);\n  const freq = autoCorrelate(buf, tunerCtx.sampleRate);\n  if (freq > 0) {\n    let targetIdx = selectedStr;\n    // 자동 감지: 가장 가까운 줄 찾기\n    if (tunerAutoMode) {\n      let minAbsCents = Infinity;\n      STRINGS.forEach((s, i) => {\n        const ac = Math.abs(1200 * Math.log2(freq / s.freq));\n        if (ac < minAbsCents) { minAbsCents = ac; targetIdx = i; }\n      });\n      if (targetIdx !== selectedStr) {\n        selectedStr = targetIdx;\n        updateStringHighlight(targetIdx);\n        document.getElementById('tunerTargetNote').textContent = STRINGS[targetIdx].note;\n        document.getElementById('tunerTargetHz').textContent   = STRINGS[targetIdx].freq.toFixed(2) + ' Hz';\n      }\n    }\n    const target = STRINGS[targetIdx].freq;\n    const cents  = Math.round(1200 * Math.log2(freq / target));\n    const clamped = Math.max(-50, Math.min(50, cents));\n    setNeedle(clamped);\n    const lbl = document.getElementById('tunerLabel');\n    if (Math.abs(cents) <= 5) {\n      lbl.textContent = '✅ 정확해요!';\n      lbl.className   = 'tuner-label intune';\n    } else if (cents < 0) {\n      lbl.textContent = '▼ 너무 낮아요';\n      lbl.className   = 'tuner-label flat';\n    } else {\n      lbl.textContent = '▲ 너무 높아요';\n      lbl.className   = 'tuner-label sharp';\n    }\n  }\n  tunerAnimId = requestAnimationFrame(detectLoop);\n}\n\n// 오토코릴레이션 피치 검출\nfunction autoCorrelate(buf, sampleRate) {\n  let SIZE = buf.length;\n  let rms = 0;\n  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];\n  rms = Math.sqrt(rms / SIZE);\n  if (rms < 0.01) return -1; // 너무 조용함\n\n  let r1 = 0, r2 = SIZE - 1;\n  const thres = 0.2;\n  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < thres) { r1 = i; break; } }\n  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; } }\n  buf = buf.slice(r1, r2);\n  SIZE = buf.length;\n\n  const c = new Array(SIZE).fill(0);\n  for (let i = 0; i < SIZE; i++)\n    for (let j = 0; j < SIZE - i; j++)\n      c[i] += buf[j] * buf[j + i];\n\n  let d = 0;\n  while (d < SIZE && c[d] > c[d + 1]) d++;\n  let maxval = -1, maxpos = -1;\n  for (let i = d; i < SIZE; i++) {\n    if (c[i] > maxval) { maxval = c[i]; maxpos = i; }\n  }\n  let T0 = maxpos;\n  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];\n  const a = (x1 + x3 - 2 * x2) / 2;\n  const b = (x3 - x1) / 2;\n  if (a) T0 -= b / (2 * a);\n  return sampleRate / T0;\n}\n\n// SVG 바늘 회전 (−50cent = −90°, 0 = 0°, +50cent = +90°)\nfunction setNeedle(cents) {\n  const angle   = (cents / 50) * 90; // −90 ~ +90도\n  const rad     = (angle - 90) * Math.PI / 180;\n  const cx = 160, cy = 160, len = 112;\n  const x2 = cx + len * Math.cos(rad);\n  const y2 = cy + len * Math.sin(rad);\n  const needle = document.getElementById('tunerNeedle');\n  if (needle) {\n    needle.setAttribute('x2', x2.toFixed(1));\n    needle.setAttribute('y2', y2.toFixed(1));\n    const inTune = Math.abs(cents) <= 5;\n    needle.setAttribute('stroke', inTune ? '#5C7A6F' : '#3D3022');\n    document.querySelector('#tunerGaugeSvg circle').setAttribute('fill',\n      inTune ? '#5C7A6F' : '#3D3022');\n  }\n}\n// ═══════════════════════════════════════════════════════════════\n//  통기타 사운드 엔진 (Web Audio API)\n// ═══════════════════════════════════════════════════════════════\n\n// 개방현 주파수: frets 배열 인덱스 0=1번줄(e4) ~ 5=6번줄(E2)\nconst STRING_OPEN_FREQS = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];\n\nlet _chordCtx      = null;  // 전역 AudioContext (재사용)\nlet _chordReverb   = null;  // 리버브 컨볼버 (컨텍스트당 1개)\nlet _activeSources = [];    // 현재 재생 중인 오실레이터 노드\n\nfunction _getChordCtx() {\n  if (!_chordCtx || _chordCtx.state === 'closed') {\n    _chordCtx    = new (window.AudioContext || window.webkitAudioContext)();\n    _chordReverb = null;\n  }\n  return _chordCtx;\n}\n\n// iOS/Android 오디오 잠금 해제 — 매 제스처마다 컨텍스트 상태 확인\nfunction _unlockAudio() {\n  const ctx = _getChordCtx();\n  if (ctx.state === 'suspended') {\n    ctx.resume().then(() => {\n      if (!_chordReverb) _getChordReverb(ctx);\n    }).catch(() => {});\n  } else if (!_chordReverb) {\n    _getChordReverb(ctx);\n  }\n}\ndocument.addEventListener('touchstart',  _unlockAudio, { passive: true });\ndocument.addEventListener('touchend',    _unlockAudio, { passive: true });\ndocument.addEventListener('pointerdown', _unlockAudio, { passive: true });\ndocument.addEventListener('click',       _unlockAudio);\n\n// 합성 리버브 임펄스 응답 생성 (외부 파일 없음)\nfunction _getChordReverb(ctx) {\n  if (!_chordReverb) {\n    _chordReverb = ctx.createConvolver();\n    const rate = ctx.sampleRate;\n    const len  = Math.floor(rate * 1.4); // 1.4초 잔향\n    const buf  = ctx.createBuffer(2, len, rate);\n    for (let ch = 0; ch < 2; ch++) {\n      const d = buf.getChannelData(ch);\n      for (let i = 0; i < len; i++) {\n        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);\n      }\n    }\n    _chordReverb.buffer = buf;\n  }\n  return _chordReverb;\n}\n\n// 이미 재생 중인 소리 즉시 중단\nfunction _stopActiveSound() {\n  _activeSources.forEach(n => { try { n.stop(0); } catch (e) {} });\n  _activeSources = [];\n}\n\n// 단일 현(줄) 소리 합성 — 오실레이터 + 배음 + 코러스 + 엔벨로프\n// [배음차수, 파형, 게인, 어택(s), 감쇠비율, detune(null=랜덤 ±1.5cents / 숫자=고정cents)]\nconst _STRING_PARTIALS = [\n  [1, 'triangle', 0.52, 0.008, 1.00, null],\n  [2, 'sine',     0.20, 0.008, 1.00, null],\n  [3, 'sine',     0.10, 0.008, 1.00, null],\n  [4, 'sine',     0.05, 0.008, 1.00, null],\n  [1, 'sine',     0.07, 0.012, 0.75,    8], // 코러스 보이스 (+8 cents)\n];\n\nfunction _pluckString(ctx, freq, t, decay, dryBus, wetBus) {\n  const lpf = ctx.createBiquadFilter();\n  lpf.type            = 'lowpass';\n  lpf.frequency.value = Math.min(freq * 8, 5500);\n  lpf.Q.value         = 0.7;\n  lpf.connect(dryBus);\n  lpf.connect(wetBus);\n\n  _STRING_PARTIALS.forEach(([mult, type, amp, atk, decMult, fixedDetune]) => {\n    const osc = ctx.createOscillator();\n    osc.type            = type;\n    osc.frequency.value = freq * mult;\n    osc.detune.value    = fixedDetune !== null ? fixedDetune : (Math.random() - 0.5) * 3;\n\n    const env = ctx.createGain();\n    env.gain.setValueAtTime(0, t);\n    env.gain.linearRampToValueAtTime(amp, t + atk);\n    env.gain.exponentialRampToValueAtTime(0.0001, t + decay * decMult);\n\n    osc.connect(env);\n    env.connect(lpf);\n    osc.start(t);\n    osc.stop(t + decay * decMult + 0.1);\n    _activeSources.push(osc);\n  });\n}\n\n// 스트로크 모드: 'fast'=15ms, 'arpeggio'=100ms (기본값)\nlet _strumGap = 0.300;\n\nfunction setStrumMode(mode) {\n  _strumGap = mode === 'fast' ? 0.015 : 0.300;\n  document.getElementById('strumBtnFast').classList.toggle('active', mode === 'fast');\n  document.getElementById('strumBtnArpeggio').classList.toggle('active', mode === 'arpeggio');\n}\n\nfunction setStrumModeAndPlay(mode, chordName, sectionType) {\n  _unlockAudio();\n  setStrumMode(mode);\n  playChordSoundByName(chordName, sectionType);\n}\n\n// 코드 전체 재생 — 6번줄→1번줄 순서로 스트로크\nfunction playChordSound(chord) {\n  if (!chord || !chord.frets) return;\n\n  const ctx = _getChordCtx();\n  _stopActiveSound();\n\n  // iOS/Android: resume을 제스처 내에서 동기 호출 후 충분한 딜레이로 스케줄링\n  const wasSuspended = ctx.state !== 'running';\n  if (wasSuspended) ctx.resume().catch(() => {});\n\n  const dryGain = ctx.createGain();\n  dryGain.gain.value = 0.78;\n  dryGain.connect(ctx.destination);\n\n  const wetGain = ctx.createGain();\n  wetGain.gain.value = 0.22;\n  const reverb = _getChordReverb(ctx);\n  wetGain.connect(reverb);\n  reverb.connect(ctx.destination);\n\n  const DECAY      = 2.5;\n  const STRUM_GAP  = _strumGap;\n  // 컨텍스트가 suspended였으면 300ms 여유, 이미 실행 중이면 100ms\n  const startDelay = wasSuspended ? 0.30 : 0.10;\n\n  let t = ctx.currentTime + startDelay;\n  for (let i = 5; i >= 0; i--) {\n    const fret = chord.frets[i];\n    if (fret === -1) continue;\n    const freq = STRING_OPEN_FREQS[i] * Math.pow(2, fret / 12);\n    _pluckString(ctx, freq, t, DECAY, dryGain, wetGain);\n    t += STRUM_GAP;\n  }\n\n  // 소리가 완전히 감쇠된 후 버스 노드 연결 해제 (audio graph 누적 방지)\n  const cleanupMs = (DECAY + STRUM_GAP * 6 + startDelay + 0.3) * 1000;\n  setTimeout(() => { dryGain.disconnect(); wetGain.disconnect(); }, cleanupMs);\n}\n\n// sectionType 기반 코드 검색 후 재생 (카드·상세 패널용)\nfunction playChordSoundByName(name, sectionType) {\n  const meta  = SECTION_META[sectionType];\n  const chord = meta ? meta.chordsRef().find(c => c.name === name) : null;\n  if (chord) playChordSound(chord);\n}\n\n// 코드명으로 전체 데이터에서 검색 (노래 chord-token용)\n// SECTION_META를 단일 출처로 사용하므로 새 코드 풀 추가 시 자동 반영됨\nfunction _findChordByName(name) {\n  for (const meta of Object.values(SECTION_META)) {\n    const c = meta.chordsRef().find(x => x.name === name);\n    if (c) return c;\n  }\n  return null;\n}\n\n// 노래 코너 chord-token 클릭 → 소리 재생 (이벤트 위임)\ndocument.addEventListener('click', function (e) {\n  const token = e.target.closest('.chord-token');\n  if (!token) return;\n  const chord = _findChordByName(token.textContent.trim());\n  if (chord) playChordSound(chord);\n});\n\n// ─── 사운드 엔진 끝 ──────────────────────────────────────────\n\nfunction showResult(pool) {\n  const st = quizState[pool];\n  document.getElementById(`${pool}QuizCard`).innerHTML = '';\n  const pct = Math.round(st.score/st.total*100);\n  const msg = pct===100 ? '호오...이 정도는 쉽다고?? 이젠 노래 연습을 해볼까?' :\n              pct>=80   ? '쓰읍...노오력이 조금 부족해' :\n              pct>=50   ? '코드를 몰라도 너~무 모르네>.<' : '이정도는 기타 피크도 맞추겠는데?';\n  const rb = document.getElementById(`${pool}ResultBox`);\n  rb.innerHTML = `\n    <h2>결과 발표!<\u002Fh2>\n    <div class=\"result-score\">${st.score} / ${st.total}<\u002Fdiv>\n    <div class=\"result-msg\">${msg} (정답률 ${pct}%)<\u002Fdiv>\n    <button class=\"restart-btn\" onclick=\"startQuiz('${pool}')\">다시 도전하기 🔄<\u002Fbutton>`;\n  rb.style.display = 'block';\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
